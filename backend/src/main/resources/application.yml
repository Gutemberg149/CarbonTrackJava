# ===================================================================
# CONFIGURAÇÃO GERAL - SPRING BOOT
# ===================================================================
spring:
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${DB_USERNAME:rm562267}
    password: ${DB_PASSWORD:fiap26}
    hikari:
      pool-name: CarbonTrackHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
        dialect: org.hibernate.dialect.OracleDialect

  jackson:
    serialization:
      indent-output: true
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: America/Sao_Paulo

  mvc:
    problemdetails:
      enabled: true

  cache:
    type: simple

# ===================================================================
# SERVIDOR
# ===================================================================
server:
  port: ${PORT:8080}
  address: 0.0.0.0
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

# ===================================================================
# SPRINGDOC (SWAGGER)
# ===================================================================
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none

# ===================================================================
# ACTUATOR
# ===================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    env:
      enabled: true

# ===================================================================
# LOGGING
# ===================================================================
logging:
  level:
    root: INFO
    br.com.fiap.javaadv.backend: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/carbontrack.log
    max-size: 10MB
    max-history: 30

# ===================================================================
# APLICAÇÃO
# ===================================================================
app:
  name: CarbonTrack API
  version: 1.0.0
  description: API para gestão de créditos de carbono
  db:
    seed-enabled: true

# ===================================================================
# CALCULADORA DE CARBONO
# ===================================================================
calculadora:
  carbono:
    fator_conversao: 0.47
    biomassa_media_ton_ha: 150.0
    sequestro_mensal_ton_ha: 0.5
    valor_minimo: 1.0
    ajustes:
      floresta_densa: 1.2
      floresta_aberta: 0.9
      cerrado: 0.7
      pastagem: 0.3
      agricultura: 0.4
    formula:
      area: "AREA_HECTARES * BIOMASSA_MEDIA * FATOR_CONVERSAO"
      tempo: "AREA_HECTARES * SEQUESTRO_MENSAL * MESES_POSSE"

# ===================================================================
# CRÉDITOS DE CARBONO
# ===================================================================
credito:
  registro:
    emissao_automatica: true
    permite_edicao: false
    permite_exclusao: true
  valor_mercado:
    preco_tonelada_usd: ${PRECO_CARBONO_USD:5.0}
    moeda: USD
  validade:
    dias: 365

# ===================================================================
# JWT SECURITY
# ===================================================================
security:
  jwt:
    secret: ${JWT_SECRET:c4r60n-tr4ck-2026-jwt-s3cr3t-k3y-256b}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
    issuer: carbontrack-api
    audience: carbontrack-client

# ===================================================================
# PLANET API - CREDENCIAIS VÁLIDAS
# ===================================================================
planet:
  enabled: true
  auth:
    client_id: 7c0d34d7-5bcc-4250-a255-d42e4727c41b
    client_secret: ZpPL6SfDIpHAsOFTAau72tfLg3vJC67H
    api_key: PLAKbac00399a1094547badda8caae30f3e4
    organization: WS_014e6947-4715-4a8c-bacd-29b2d05dc61a
  api:
    url: https://api.planet.com/data/v1
    timeout: 30000
    retry:
      max-attempts: 3
      backoff-delay: 1000
  mock:
    enabled: false
    default-biomassa: 150.0
    default-ndvi: 0.65
  endpoints:
    biomass: /stats/geojson
    ndvi: /ndvi
    landcover: /landcover
    soil-carbon: /soil-carbon

# ===================================================================
# CORS CONFIGURATION
# ===================================================================
cors:
  allowed-origins: "${CORS_ALLOWED_ORIGINS:*}"
  allowed-methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
  allowed-headers: "*"
  allow-credentials: false
  max-age: 3600

# ===================================================================
# GEOSPATIAL CONFIGURATION
# ===================================================================
geospatial:
  srid: 4674
  area:
    calculation-method: SPHERICAL
    earth-radius-meters: 6371000
  validation:
    max-area-hectares: 1000000
    min-area-hectares: 0.01

# ===================================================================
# ===================================================================
# PERFIS DE AMBIENTE - TODOS COM MODO REAL
# ===================================================================
