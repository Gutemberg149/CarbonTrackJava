# ===================================================================
# CONFIGURAÇÃO GERAL - SPRING BOOT
# ===================================================================
spring:
  # Otimização para nuvem: timeout de conexão
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${DB_USERNAME:rm562267}
    password: ${DB_PASSWORD:fiap26}
    hikari:
      pool-name: CarbonTrackHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc.batch_size: 50
        # Otimização: evita lock no banco para leitura
        order_inserts: true
        order_updates: true

  jackson:
    serialization:
      indent-output: true
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: America/Sao_Paulo

  mvc:
    problemdetails:
      enabled: true

  cache:
    type: simple

# Configuração de rede para render
server:
  port: ${PORT:8080}
  address: 0.0.0.0
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    br.com.fiap.javaadv.backend: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ===================================================================
# CONFIGURAÇÕES DE NEGÓCIO (Calculadora)
# ===================================================================
app:
  db.seed-enabled: true
  name: CarbonTrack API
  version: 1.0.0

calculadora:
  carbono:
    fator_conversao: 0.47
    biomassa_media_ton_ha: 150.0
    sequestro_mensal_ton_ha: 0.5
    valor_minimo: 1.0
    ajustes:
      floresta_densa: 1.2
      floresta_aberta: 0.9
      cerrado: 0.7
      pastagem: 0.3
      agricultura: 0.4

credito:
  registro:
    emissao_automatica: true
    permite_edicao: false
  valor_mercado:
    preco_tonelada_usd: ${PRECO_CARBONO_USD:5.0}

# ===================================================================
# PERFIS
# ===================================================================
---
spring:
  config.activate.on-profile: dev
  datasource:
    url: jdbc:h2:mem:carbontrackdb;MODE=Oracle;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
  jpa:
    hibernate.ddl-auto: create-drop
    show-sql: true
  h2.console.enabled: true

---
spring:
  config.activate.on-profile: prod
  jpa:
    show-sql: false
    hibernate.ddl-auto: validate
  datasource:
    hikari:
      maximum-pool-size: 20
  logging.level.org.springframework.web: WARN
  management.endpoints.web.exposure.include: health,info,metrics,prometheus

---
spring:
  config.activate.on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=Oracle
    driver-class-name: org.h2.Driver
  jpa.hibernate.ddl-auto: create-drop