# ===================================================================
# CONFIGURAÇÃO GERAL - SPRING BOOT
# ===================================================================
spring:
  # -------------------------------------------------------------------
  # DATASOURCE (ORACLE PRODUÇÃO)
  # -------------------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${DB_USERNAME:rm562267}
    password: ${DB_PASSWORD:fiap26}
    hikari:
      pool-name: CarbonTrackHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # -------------------------------------------------------------------
  # JPA / HIBERNATE
  # -------------------------------------------------------------------
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 50

  # -------------------------------------------------------------------
  # JACKSON (JSON)
  # -------------------------------------------------------------------
  jackson:
    serialization:
      indent-output: true
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: America/Sao_Paulo

  # -------------------------------------------------------------------
  # MVC
  # -------------------------------------------------------------------
  mvc:
    problemdetails:
      enabled: true

  # -------------------------------------------------------------------
  # CACHE
  # -------------------------------------------------------------------
  cache:
    type: simple
    cache-names:
      - dadosSatelite
      - creditoCarbono

# ===================================================================
# SERVIDOR
# ===================================================================
server:
  port: 8080
  compression:
    enabled: true

# ===================================================================
# SPRINGDOC (SWAGGER)
# ===================================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ===================================================================
# ACTUATOR
# ===================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always

# ===================================================================
# LOGGING
# ===================================================================
logging:
  level:
    root: INFO
    br.com.fiap.javaadv.backend: DEBUG
    br.com.fiap.javaadv.backend.integration: DEBUG

# ===================================================================
# APLICAÇÃO
# ===================================================================
app:
  db:
    seed-enabled: true

# ===================================================================
# CALCULADORA DE CARBONO
# ===================================================================
calculadora:
  carbono:
    # Fatores de conversão
    fator_conversao: 0.47
    biomassa_media_ton_ha: 150.0

    # Sequestro mensal (tCO₂ por hectare por mês)
    sequestro_mensal_ton_ha: 0.5

    # Valor mínimo para evitar valores negativos
    valor_minimo: 1.0

    # Ajustes por tipo de vegetação
    ajustes:
      floresta_densa: 1.2
      floresta_aberta: 0.9
      cerrado: 0.7
      pastagem: 0.3
      agricultura: 0.4

# ===================================================================
# CRÉDITO DE CARBONO
# ===================================================================
credito:
  registro:
    emissao_automatica: true
    permite_edicao: false
  valor_mercado:
    preco_tonelada_usd: ${PRECO_CARBONO_USD:5.0}

# ===================================================================
# PERFIL DEV (H2)
# ===================================================================
---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:carbontrackdb;MODE=Oracle;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  db:
    seed-enabled: true

calculadora:
  carbono:
    sequestro_mensal_ton_ha: 0.5

logging:
  level:
    br.com.fiap.javaadv.backend: DEBUG

# ===================================================================
# PERFIL PROD (ORACLE)
# ===================================================================
---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  datasource:
    hikari:
      maximum-pool-size: 20

app:
  db:
    seed-enabled: false

calculadora:
  carbono:
    sequestro_mensal_ton_ha: 0.5

logging:
  level:
    br.com.fiap.javaadv.backend: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

# ===================================================================
# PERFIL TEST
# ===================================================================
---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=Oracle;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

calculadora:
  carbono:
    sequestro_mensal_ton_ha: 0.5

logging:
  level:
    br.com.fiap.javaadv.backend: WARN