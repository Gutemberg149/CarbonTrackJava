# ===================================================================
# CONFIGURAÇÃO GERAL - SPRING BOOT
# ===================================================================
spring:
  # -------------------------------------------------------------------
  # DATASOURCE (ORACLE PRODUÇÃO)
  # -------------------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${DB_USERNAME:rm562267}
    password: ${DB_PASSWORD:fiap26}
    hikari:
      pool-name: CarbonTrackHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # -------------------------------------------------------------------
  # JPA / HIBERNATE
  # -------------------------------------------------------------------
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc.batch_size: 50

  # -------------------------------------------------------------------
  # JACKSON (JSON)
  # -------------------------------------------------------------------
  jackson:
    serialization:
      indent-output: true
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: America/Sao_Paulo

  # -------------------------------------------------------------------
  # MVC
  # -------------------------------------------------------------------
  mvc:
    problemdetails:
      enabled: true

# ===================================================================
# SERVIDOR
# ===================================================================
server:
  port: 8080
  compression:
    enabled: true

# ===================================================================
# SPRINGDOC (OPENAPI / SWAGGER)
# ===================================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ===================================================================
# ACTUATOR (MONITORAMENTO)
# ===================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always

# ===================================================================
# LOGGING
# ===================================================================
logging:
  level:
    root: INFO
    br.com.fiap.javaadv.backend: DEBUG

# ===================================================================
# APLICAÇÃO (SEED)
# ===================================================================
app:
  db:
    seed-enabled: true  # Altere para 'true' uma vez para criar tabelas

# ===================================================================
# PERFIL DEV (H2)
# ===================================================================
---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:carbontrackdb;MODE=Oracle;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  # Seed ativo por padrão no dev
  app:
    db:
      seed-enabled: true

# ===================================================================
# PERFIL PROD
# ===================================================================
---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none

  datasource:
    hikari:
      maximum-pool-size: 20

  app:
    db:
      seed-enabled: true